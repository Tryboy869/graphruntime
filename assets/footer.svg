<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 80" width="900" height="80" role="img" aria-labelledby="footer-title">
  <title id="footer-title">GraphRuntime Footer</title>
  <style>@media (prefers-reduced-motion: reduce) { * { animation: none !important; } }</style>
  <defs>
    <linearGradient id="fbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0f1e"/><stop offset="50%" stop-color="#111827"/><stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="fline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="20%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="80%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
  </defs>
  <rect width="900" height="80" fill="url(#fbg)" rx="0"/>
  <!-- Top line -->
  <rect x="0" y="0" width="900" height="2" fill="url(#fline)" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Nodes flowing across -->
  <circle r="3" fill="#00d4ff" opacity="0.7">
    <animateMotion dur="6s" repeatCount="indefinite" path="M-10,40 L910,40"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" keyTimes="0;0.1;0.9;1" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#7c3aed" opacity="0.5">
    <animateMotion dur="8s" repeatCount="indefinite" begin="2s" path="M-10,40 L910,40"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.1;0.9;1" dur="8s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#f59e0b" opacity="0.5">
    <animateMotion dur="7s" repeatCount="indefinite" begin="4s" path="M-10,40 L910,40"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.1;0.9;1" dur="7s" begin="4s" repeatCount="indefinite"/>
  </circle>
  <!-- Text -->
  <text x="450" y="36" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#ffffff" opacity="0.4" letter-spacing="2">
    MIT License · Built with graph.json · Universal Architecture Protocol
  </text>
  <text x="450" y="56" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#00d4ff" opacity="0.35" letter-spacing="1">
    graphruntime extract · merge · run · goal
  </text>
  <!-- Bottom line -->
  <rect x="0" y="78" width="900" height="2" fill="url(#fline)" opacity="0.3"/>
</svg>
