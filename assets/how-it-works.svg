<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" role="img" aria-labelledby="how-title">
  <title id="how-title">How GraphRuntime Works</title>
  <style>
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
    text { font-family: 'Courier New', monospace; }
  </style>
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1e"/><stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="node-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/><stop offset="100%" stop-color="#0d2137"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="node-glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00d4ff"/>
    </marker>
  </defs>

  <rect width="900" height="320" fill="url(#bg2)" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="14" fill="#ffffff" opacity="0.7" letter-spacing="2">
    HOW IT WORKS
  </text>

  <!-- STEP 1: PKG A -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.2s" fill="freeze"/>
    <rect x="30" y="70" width="150" height="80" rx="8" fill="url(#node-grad)" stroke="#00d4ff" stroke-width="1.5" filter="url(#node-glow)"/>
    <text x="105" y="100" text-anchor="middle" font-size="11" fill="#00d4ff" font-weight="bold">PKG A</text>
    <text x="105" y="118" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.6">flask / numpy</text>
    <text x="105" y="136" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.6">any repo / SDK</text>
  </g>

  <!-- STEP 2: PKG B -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.5s" fill="freeze"/>
    <rect x="30" y="180" width="150" height="80" rx="8" fill="url(#node-grad)" stroke="#7c3aed" stroke-width="1.5" filter="url(#node-glow)"/>
    <text x="105" y="210" text-anchor="middle" font-size="11" fill="#7c3aed" font-weight="bold">PKG B</text>
    <text x="105" y="228" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.6">pdf-lib / react</text>
    <text x="105" y="246" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.6">any language</text>
  </g>

  <!-- Arrow PKG→Extract -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.9s" fill="freeze"/>
    <line x1="182" y1="110" x2="248" y2="150" stroke="url(#arrow-grad)" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="5,3">
      <animate attributeName="stroke-dashoffset" values="20;0" dur="1s" begin="0.9s" repeatCount="indefinite"/>
    </line>
    <line x1="182" y1="220" x2="248" y2="180" stroke="url(#arrow-grad)" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="5,3">
      <animate attributeName="stroke-dashoffset" values="20;0" dur="1s" begin="1.1s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- STEP 3: Extract (4 questions) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.2s" fill="freeze"/>
    <rect x="250" y="100" width="160" height="130" rx="8" fill="#0f1f0f" stroke="#10b981" stroke-width="1.5" filter="url(#node-glow)"/>
    <text x="330" y="122" text-anchor="middle" font-size="11" fill="#10b981" font-weight="bold">EXTRACT</text>
    <text x="330" y="140" text-anchor="middle" font-size="10" fill="#10b981" opacity="0.8">4 Questions</text>
    <text x="265" y="158" font-size="9" fill="#ffffff" opacity="0.6">→ What enters?</text>
    <text x="265" y="172" font-size="9" fill="#ffffff" opacity="0.6">→ What exits?</text>
    <text x="265" y="186" font-size="9" fill="#ffffff" opacity="0.6">→ What does it call?</text>
    <text x="265" y="200" font-size="9" fill="#ffffff" opacity="0.6">→ Who calls it?</text>
    <text x="330" y="220" text-anchor="middle" font-size="9" fill="#10b981" opacity="0.7">42 languages</text>
  </g>

  <!-- Arrow Extract→graph.json -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.8s" fill="freeze"/>
    <line x1="412" y1="165" x2="462" y2="165" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,3">
      <animate attributeName="stroke-dashoffset" values="20;0" dur="1s" begin="1.8s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- STEP 4: graph.json -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.0s" fill="freeze"/>
    <rect x="464" y="120" width="120" height="90" rx="8" fill="#1a1a0f" stroke="#f59e0b" stroke-width="2" filter="url(#node-glow)"/>
    <text x="524" y="148" text-anchor="middle" font-size="13" fill="#f59e0b" font-weight="bold">graph</text>
    <text x="524" y="165" text-anchor="middle" font-size="13" fill="#f59e0b" font-weight="bold">.json</text>
    <text x="524" y="195" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.5">universal format</text>
    <!-- Pulse -->
    <rect x="464" y="120" width="120" height="90" rx="8" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-width" values="1;8;1" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Arrow graph.json→LLM -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.5s" fill="freeze"/>
    <line x1="586" y1="165" x2="636" y2="165" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,3">
      <animate attributeName="stroke-dashoffset" values="20;0" dur="1s" begin="2.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- STEP 5: LLM Reason -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="2.7s" fill="freeze"/>
    <rect x="638" y="110" width="130" height="110" rx="8" fill="#1a0f2e" stroke="#7c3aed" stroke-width="1.5" filter="url(#node-glow)"/>
    <text x="703" y="134" text-anchor="middle" font-size="11" fill="#7c3aed" font-weight="bold">LLM</text>
    <text x="703" y="150" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">Groq / OpenAI</text>
    <text x="703" y="166" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.7">Anthropic / Ollama</text>
    <text x="703" y="186" text-anchor="middle" font-size="9" fill="#7c3aed" opacity="0.9">Reasons on graph</text>
    <text x="703" y="200" text-anchor="middle" font-size="9" fill="#7c3aed" opacity="0.9">not raw code</text>
  </g>

  <!-- Arrow LLM→runtime.json -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.3s" fill="freeze"/>
    <line x1="703" y1="222" x2="703" y2="260" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,3">
      <animate attributeName="stroke-dashoffset" values="20;0" dur="1s" begin="3.3s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- STEP 6: runtime.json + run -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="3.5s" fill="freeze"/>
    <rect x="610" y="262" width="185" height="45" rx="8" fill="#0f1a0f" stroke="#10b981" stroke-width="2"/>
    <text x="703" y="282" text-anchor="middle" font-size="11" fill="#10b981" font-weight="bold">runtime.json → RUN</text>
    <text x="703" y="297" text-anchor="middle" font-size="9" fill="#ffffff" opacity="0.6">Any language. Any platform.</text>
  </g>

  <!-- Bottom label -->
  <text x="450" y="310" text-anchor="middle" font-size="10" fill="#ffffff" opacity="0.3" letter-spacing="1">
    Extract → Graph → Reason → Merge → Execute
  </text>
</svg>
